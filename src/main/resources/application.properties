spring.application.name=tour-search-api
server.port=8080
telegram.bot.username=germes_travel_bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
admin.bot.username=GT_main_bot
admin.bot.token=${ADMIN_BOT_TOKEN:}
admin.chat.id=${ADMIN_CHAT_ID:1807198}

# VK Mini App
vk.confirmation.code=${VK_CONFIRMATION_CODE:}
vk.group.id=${VK_GROUP_ID:0}
vk.secret=${VK_SECRET:}

# Max (Odnoklassniki)
max.verify.token=${MAX_VERIFY_TOKEN:}
max.secret.key=${MAX_SECRET_KEY:}

# JWT
jwt.secret=${JWT_SECRET:GermesTravel2026SecretKeyForJWTAtLeast32Chars}
jwt.expiration=86400000

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/toursearch}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
